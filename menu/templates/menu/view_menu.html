{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu • H2W Restaurant</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'home/css/style.css' %}">
</head>
<body class="bg-dark text-light">

  <nav class="navbar navbar-expand-lg navbar-dark navbar-glass py-3">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2 fw-semibold" href="{% url 'home' %}">
        <span class="brand-mark">H2W</span>
        <span class="brand-text">Restaurant</span>
      </a>

      <div class="collapse navbar-collapse justify-content-end">
        <ul class="navbar-nav align-items-lg-center gap-lg-3">
          <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="{% url 'view_menu' %}">Menu</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'contact' %}">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <section class="py-5 text-center">
    <div class="container">
      <p class="section-kicker mb-2">Our Menu</p>
      <h1 class="page-title mb-3">Explore Our Dishes</h1>
      <p class="text-white-50 mb-4">Tap below to view our latest menu instantly.</p>

      {% if menu %}
        <a class="btn btn-gold px-4 py-2"
           href="{% url 'menu_pdf_view' %}"
           target="_blank"
           rel="noopener">
          View Menu
        </a>
      {% else %}
        <p class="text-white-50">Menu not uploaded yet.</p>
      {% endif %}
    </div>
  </section>

</body>
</html>
