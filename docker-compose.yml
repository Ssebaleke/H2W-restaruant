services:
  web:
    build: .
    env_file:
      - .env
    ports:
      - "8002:8000"
    command: >
      sh -c "
      python manage.py migrate --noinput &&
      python manage.py collectstatic --noinput &&
      gunicorn restuarant.wsgi:application
      --bind 0.0.0.0:8000
      --workers 2
      --timeout 120
      "
    volumes:
      - ./media:/app/media
      - ./db.sqlite3:/app/db.sqlite3
    restart: unless-stopped