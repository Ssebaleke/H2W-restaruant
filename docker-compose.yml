services:
  web:
    build: .
    env_file:
      - .env
    command: >
      sh -c "
      python manage.py migrate --noinput &&
      python manage.py collectstatic --noinput &&
      gunicorn restuarant.wsgi:application
      --bind 0.0.0.0:8000
      --workers 2
      --timeout 120
      "
    volumes:
      - ./media:/app/media
      - ./db.sqlite3:/app/db.sqlite3
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./media:/app/media:ro
      - /etc/letsencrypt/live/h2wrestuarantcafe.xyz/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      - /etc/letsencrypt/live/h2wrestuarantcafe.xyz/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
    depends_on:
      - web
    restart: unless-stopped